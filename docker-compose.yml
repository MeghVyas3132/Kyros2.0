services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: kyros_dev
      POSTGRES_USER: kyros
      POSTGRES_PASSWORD: kyros_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://kyros:kyros_dev_password@postgres:5432/kyros_dev
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: dev-secret-key-change-in-production-minimum-32-chars
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_HOURS: 8
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 30
      APP_ENV: development
      CORS_ORIGINS: http://localhost:3000
      LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/.uploads
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      GROQ_KEY_REFRESH_MINUTES: ${GROQ_KEY_REFRESH_MINUTES:-10}
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info --pool=prefork --concurrency=4
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://kyros:kyros_dev_password@postgres:5432/kyros_dev
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/.uploads
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      GROQ_KEY_REFRESH_MINUTES: ${GROQ_KEY_REFRESH_MINUTES:-10}
    depends_on:
      - postgres
      - redis

  celery_beat:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://kyros:kyros_dev_password@postgres:5432/kyros_dev
      REDIS_URL: redis://redis:6379/0
      LOCAL_STORAGE: "true"
      LOCAL_STORAGE_PATH: /app/.uploads
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      LLM_ENABLED: ${LLM_ENABLED:-true}
      GROQ_KEY_REFRESH_MINUTES: ${GROQ_KEY_REFRESH_MINUTES:-10}
    depends_on:
      - postgres
      - redis
      - celery_worker

  frontend:
    build: ./frontend
    restart: unless-stopped
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
